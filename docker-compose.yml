services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/videos &&
        mc admin config set local notify_webhook:vidroapi \
          endpoint=http://host.docker.internal:5144/webhooks/minio-upload-completed \
          auth_token=change-me-minio-upload-token &&
        mc admin service restart local --json &&
        sleep 5 &&
        mc event add local/videos arn:minio:sqs::vidroapi:webhook \
          --event put --prefix raw/
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: .
    container_name: video-processor-worker
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      REDIS_HOST: redis:6379
      PROCESSING_REQUEST_QUEUE: video_queue
      PROCESSING_FINISHED_QUEUE: video_success_queue
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_NAME: videos
      WEBHOOK_SECRET: dev-webhook-secret
    volumes:
      - ./tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # GPU (NVENC): a imagem padrão (Alpine + ffmpeg) não inclui suporte NVIDIA.
    # Para usar a 3060 Ti: instale nvidia-container-toolkit, use uma imagem com FFmpeg+NVENC
    # (ex.: base ubuntu/cuda ou jrottenberg/ffmpeg) e adicione:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Se quiser rodar em modo interativo para debug, descomente:
    # tty: true

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  minio_data:
  grafana_data: